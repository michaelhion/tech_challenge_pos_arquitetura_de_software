version: '3.8'

services:

  postgres:
    image: postgres:16

    container_name: oficina360-postgres

    environment:
      POSTGRES_DB: oficina360
      POSTGRES_USER: oficina360
      POSTGRES_PASSWORD: oficina360

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina360 -d oficina360"]
      interval: 10s
      timeout: 5s
      retries: 10

  oficina360:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: oficina360-api

    ports:
      - "18080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oficina360
      SPRING_DATASOURCE_USERNAME: oficina360
      SPRING_DATASOURCE_PASSWORD: oficina360

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres-data: