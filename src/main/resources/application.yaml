spring:
  application:
    name: oficina360

  datasource:
    url: jdbc:h2:mem:oficina360;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAILTRAP_USERNAME:110e724e5cf304}
    password: ${MAILTRAP_PASSWORD:8cc06ddb887b0d}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true



  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  api-docs:
    path: /v3/api-docs

api:
  security:
    jwt:
      secret: ${JWT_SECRET:oficina360-secret-key-dev}
      issuer: oficina360-api
      expiration-hours: 2
