apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: oficina360

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              value: oficina360

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: oficina360-secret
                  key: DB_USERNAME

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oficina360-secret
                  key: DB_PASSWORD