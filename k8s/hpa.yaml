apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: oficina360-api
  namespace: oficina360

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oficina360-api

  minReplicas: 1

  maxReplicas: 5

  metrics:

    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 50